name: "PKI: Rotate Root CA"

# Rotates the Root CA: generates a fresh Root keypair, re-signs every
# existing Issuing CA cert with it, and re-encrypts the new Root key
# with the founders' NEW passphrases.
#
# 2-of-2 enforced by gate-felixboehm + gate-nantero1.
#
# IMPORTANT — passphrase handover (no inputs).
# Workflow inputs are visible in run metadata on a public repo, so new
# passphrases CANNOT be passed as inputs. Instead, both founders set
# their NEW passphrases as additional env secrets BEFORE triggering:
#
#   pki-root / PKI_PASSWORD_FELIXBOEHM_NEW   (set by felixboehm)
#   pki-root / PKI_PASSWORD_NANTERO1_NEW     (set by nantero1)
#
# After this workflow's PR is merged AND ./scripts/sync-keys-from-workflow.sh
# has updated ROOT_CA_KEY_NESTED_B64, both founders must:
#   1. Copy each *_NEW value into the canonical PKI_PASSWORD_<FOUNDER> slot.
#   2. Delete the *_NEW slot.
# Until step 1 is done the new key is unusable.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  gate-felixboehm:
    name: "Gate: felixboehm approval"
    runs-on: ubuntu-latest
    environment: pki-felixboehm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-felixboehm policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-felixboehm

  gate-nantero1:
    name: "Gate: nantero1 approval"
    runs-on: ubuntu-latest
    needs: gate-felixboehm
    environment: pki-nantero1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-nantero1 policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-nantero1

  rotate:
    name: Rotate Root CA
    runs-on: ubuntu-latest
    needs: [gate-felixboehm, gate-nantero1]
    environment: pki-root
    env:
      PASSWORD_FELIXBOEHM: ${{ secrets.PKI_PASSWORD_FELIXBOEHM }}
      PASSWORD_NANTERO1: ${{ secrets.PKI_PASSWORD_NANTERO1 }}
      NEW_PASSWORD_FELIXBOEHM: ${{ secrets.PKI_PASSWORD_FELIXBOEHM_NEW }}
      NEW_PASSWORD_NANTERO1: ${{ secrets.PKI_PASSWORD_NANTERO1_NEW }}
      ROOT_CA_KEY_NESTED_B64: ${{ secrets.ROOT_CA_KEY_NESTED_B64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}

      - name: Verify pki-root policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-root

      - name: Verify _NEW passphrases are set
        run: |
          if [ -z "${NEW_PASSWORD_FELIXBOEHM:-}" ] || [ -z "${NEW_PASSWORD_NANTERO1:-}" ]; then
            echo "::error::PKI_PASSWORD_FELIXBOEHM_NEW and PKI_PASSWORD_NANTERO1_NEW must both be set in pki-root before triggering rotate."
            echo "::error::Each founder runs:  echo <new-pass> | gh secret set PKI_PASSWORD_<FOUNDER>_NEW --env pki-root"
            exit 1
          fi

      - name: Rotate Root CA
        run: |
          source .github/pki.sh
          TMPDIR="$(mktemp -d)"
          BLOBS="${GITHUB_WORKSPACE}/blobs"
          mkdir -p "$BLOBS"

          # Decrypt OLD Root CA (nested: outer = felixboehm, inner = nantero1)
          printf '%s' "$ROOT_CA_KEY_NESTED_B64" | base64 -d > "${TMPDIR}/old-root.nested.enc"
          nested_decrypt_outer "${TMPDIR}/old-root.nested.enc" "${TMPDIR}/old-root.inner.enc" "$PASSWORD_FELIXBOEHM"
          nested_decrypt_inner "${TMPDIR}/old-root.inner.enc" "${TMPDIR}/old-root.key" "$PASSWORD_NANTERO1"
          rm -f "${TMPDIR}/old-root.nested.enc" "${TMPDIR}/old-root.inner.enc"

          # Archive old Root cert
          mkdir -p pki/root/archive
          cp pki/root/ca-cert.pem "pki/root/archive/ca-cert-$(date +%Y%m%d).pem"

          # Generate NEW Root CA
          generate_rsa_key 4096 "${TMPDIR}/new-root.key"
          create_root_ca "${TMPDIR}/new-root.key" pki/root/ca-cert.pem 3650

          # Re-sign every existing Issuing CA cert with the NEW Root
          for issuer_dir in pki/issuers/*/; do
            partner="$(basename "$issuer_dir")"
            issuer_cert="${issuer_dir}issuing-cert.pem"
            [ -f "$issuer_cert" ] || continue

            openssl x509 -in "$issuer_cert" -noout -pubkey > "${TMPDIR}/issuer-pub.pem"

            openssl x509 -req \
              -in <(openssl req -new -key "${TMPDIR}/old-root.key" -subj "/CN=Performance Dudes Issuing CA - ${partner}/O=Performance Dudes") \
              -force_pubkey "${TMPDIR}/issuer-pub.pem" \
              -CA pki/root/ca-cert.pem -CAkey "${TMPDIR}/new-root.key" \
              -set_serial "0x$(openssl rand -hex 16)" \
              -out "$issuer_cert" -days 1825 \
              -extfile <(printf '%s\n' \
                "basicConstraints=critical,CA:TRUE,pathlen:0" \
                "keyUsage=critical,keyCertSign,cRLSign" \
                "subjectKeyIdentifier=hash" \
                "authorityKeyIdentifier=keyid:always" \
                "crlDistributionPoints=URI:${PD_TRUST_REPO_URL_BASE}/pki/crl/root-crl.pem" \
                "authorityInfoAccess=caIssuers;URI:${PD_TRUST_REPO_URL_BASE}/pki/root/ca-cert.pem")
            echo "Re-signed: $issuer_cert"
          done

          # Re-create empty Root CRL signed by the new Root key
          create_empty_crl "${TMPDIR}/new-root.key" pki/root/ca-cert.pem pki/crl/root-crl.pem 3650

          # Nested-encrypt new Root key with NEW passphrases
          nested_encrypt_both "${TMPDIR}/new-root.key" \
            "${BLOBS}/root-ca-key.nested.enc" \
            "$NEW_PASSWORD_NANTERO1" "$NEW_PASSWORD_FELIXBOEHM"

          # Wipe plaintext keys
          secure_wipe "${TMPDIR}/old-root.key"
          secure_wipe "${TMPDIR}/new-root.key"
          rm -rf "${TMPDIR}"

      - name: Verify chain
        run: |
          for issuer_dir in pki/issuers/*/; do
            cert="${issuer_dir}issuing-cert.pem"
            [ -f "$cert" ] && openssl verify -CAfile pki/root/ca-cert.pem "$cert"
          done

      - name: Upload encrypted Root CA blob
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-keys
          path: blobs/*.enc
          retention-days: 7

      - name: Remove blobs before commit
        run: rm -rf blobs

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="pki/rotate-root-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pki/root/ pki/issuers/ pki/crl/
          git commit -m "feat: rotate Root CA key

          Old Root cert archived. All Issuing CAs re-signed with the new Root.
          End-entity certs unchanged (they chain to Issuing CAs)."
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: rotate Root CA key" \
            --body "## Summary

          Root CA rotated. Old cert archived. All Issuing CAs re-signed with the new Root.
          End-entity certs are unchanged (they chain to Issuing CAs, not Root).

          ## Public files
          - \`pki/root/ca-cert.pem\` — new Root CA certificate
          - \`pki/root/archive/\` — old Root CA cert archived
          - \`pki/issuers/*/issuing-cert.pem\` — re-signed Issuing CA certs
          - \`pki/crl/root-crl.pem\` — fresh empty CRL signed by new Root

          ## Encrypted Root CA key
          New nested-encrypted blob uploaded as workflow artifact \`encrypted-keys\`.

          ## Post-merge follow-up (in order)

          1. Sync the new encrypted Root blob:
             \`\`\`
             ./scripts/sync-keys-from-workflow.sh ${{ github.run_id }}
             \`\`\`
          2. Promote the _NEW passphrases to the canonical slots:
             \`\`\`
             # In pki-root, copy each _NEW value into its canonical slot,
             # then delete the _NEW slot. Each founder does their own.
             # Until both promotions complete, the new Root key cannot be decrypted.
             \`\`\`
          3. Both partners verify the chain on \`main\`."

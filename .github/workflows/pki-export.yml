name: "PKI: Export Root CA (Escape Hatch)"

# Provides the encrypted Root CA blob as a downloadable workflow artifact,
# so the PKI can be reconstituted outside GitHub if we ever need to leave.
#
# What's in the artifact: the same nested-encrypted blob that lives as
# ROOT_CA_KEY_NESTED_B64 in pki-root. Encrypted with the founders' two
# passphrases. Both founders use their own passphrases out-of-band to
# decrypt (see "After download" below). Nothing new is generated here —
# no OTP that would have to be smuggled out of a public repo.
#
# 2-of-2 enforced by gate-felixboehm + gate-nantero1.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  gate-felixboehm:
    name: "Gate: felixboehm approval"
    runs-on: ubuntu-latest
    environment: pki-felixboehm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-felixboehm policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-felixboehm

  gate-nantero1:
    name: "Gate: nantero1 approval"
    runs-on: ubuntu-latest
    needs: gate-felixboehm
    environment: pki-nantero1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-nantero1 policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-nantero1

  export:
    name: Export Root CA
    runs-on: ubuntu-latest
    needs: [gate-felixboehm, gate-nantero1]
    environment: pki-root
    env:
      ROOT_CA_KEY_NESTED_B64: ${{ secrets.ROOT_CA_KEY_NESTED_B64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}

      - name: Verify pki-root policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-root

      - name: Stage encrypted Root CA blob for export
        run: |
          mkdir -p export
          printf '%s' "$ROOT_CA_KEY_NESTED_B64" | base64 -d > export/root-ca-key.nested.enc
          ls -la export/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: root-ca-export
          path: export/root-ca-key.nested.enc
          retention-days: 1

      - name: Print decryption recipe
        run: |
          cat <<'EOF'
          ============================================================
          Root CA exported as workflow artifact 'root-ca-export'.

          The artifact is the nested-encrypted blob, identical to
          ROOT_CA_KEY_NESTED_B64 in pki-root. Both founders' passphrases
          are required to decrypt — same as for any pki-root operation.

          To decrypt out-of-band (locally, on a hardened machine):
            openssl enc -d -aes-256-cbc -salt -pbkdf2 -iter 600000 \
              -pass pass:<felixboehm passphrase> \
              -in root-ca-key.nested.enc -out root-ca.inner.enc
            openssl enc -d -aes-256-cbc -salt -pbkdf2 -iter 600000 \
              -pass pass:<nantero1 passphrase> \
              -in root-ca.inner.enc -out root-ca.key

          Wipe both intermediate and output files immediately after use.
          ============================================================
          EOF

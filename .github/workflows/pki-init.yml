name: "PKI: Initialize Root CA"

# One-time workflow to create the Root CA (2-of-2). Does NOT create any
# Issuing CAs — each founder gets their Issuing CA via pki-onboard after
# this workflow. New partners later use the same pki-onboard flow.
#
# Gate jobs ensure both founders approve before the Root CA ceremony runs.
# Policy verification ensures environment protection rules are intact.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  # ── Gate: felixboehm must approve ─────────────────────────────────────────
  gate-a:
    name: "Gate: felixboehm approval"
    runs-on: ubuntu-latest
    environment: pki-felixboehm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-felixboehm policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source tools/pki.sh && verify_environment_policy pki-felixboehm

  # ── Gate: nantero1 must approve ─────────────────────────────────────────
  gate-b:
    name: "Gate: nantero1 approval"
    runs-on: ubuntu-latest
    needs: gate-a
    environment: pki-nantero1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-nantero1 policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source tools/pki.sh && verify_environment_policy pki-nantero1

  # ── Init: Generate Root CA only ──────────────────────────────────────────
  init:
    name: Initialize Root CA
    runs-on: ubuntu-latest
    needs: [gate-a, gate-b]
    environment: pki-root
    env:
      PASSWORD_FELIXBOEHM: ${{ secrets.PKI_PASSWORD_FELIXBOEHM }}
      PASSWORD_NANTERO1: ${{ secrets.PKI_PASSWORD_NANTERO1 }}
    steps:
      - uses: actions/checkout@v4

      - name: Fail if Root CA already exists
        run: |
          if [ -f pki/root/ca-cert.pem ]; then
            echo "::error::Root CA already initialized. Use pki-rotate to change it."
            exit 1
          fi

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}

      - name: Verify pki-root policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source tools/pki.sh && verify_environment_policy pki-root

      - name: Generate Root CA
        run: |
          source tools/pki.sh

          mkdir -p pki/root pki/certs pki/crl pki/csrs pki/issuers

          BLOBS="${GITHUB_WORKSPACE}/blobs"
          mkdir -p "$BLOBS"
          TMPDIR="$(mktemp -d)"

          # ── Root CA (RSA-4096, 10 years) ──
          generate_rsa_key 4096 "${TMPDIR}/root-ca.key"
          create_root_ca "${TMPDIR}/root-ca.key" pki/root/ca-cert.pem 3650
          echo "01" > pki/root/ca-cert.srl

          # ── Root CRL (empty) ──
          create_empty_crl "${TMPDIR}/root-ca.key" pki/root/ca-cert.pem \
            pki/crl/root-crl.pem 3650

          # ── Nested-encrypt Root CA (outer=felixboehm, inner=nantero1) ──
          nested_encrypt_both "${TMPDIR}/root-ca.key" \
            "${BLOBS}/root-ca-key.nested.enc" \
            "$PASSWORD_NANTERO1" "$PASSWORD_FELIXBOEHM"

          # ── Wipe plaintext ──
          secure_wipe "${TMPDIR}/root-ca.key"
          rm -rf "${TMPDIR}"

      - name: Verify Root CA certificate
        run: |
          echo "=== Root CA ==="
          openssl x509 -in pki/root/ca-cert.pem -noout -subject -issuer -dates -ext basicConstraints

      - name: Upload encrypted Root CA blob
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-keys
          path: blobs/*
          retention-days: 7

      - name: Remove blobs before commit
        run: rm -rf blobs

      - name: Create PR with Root CA cert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="pki/init-root-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pki/
          git commit -m "feat: initialize Root CA

          Root CA (RSA-4096, 10-year validity). Public certificate and
          empty Root CRL only. Encrypted Root CA key uploaded as workflow
          artifact for subsequent sync."

          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: initialize Root CA" \
            --body "## Summary
          - Root CA (RSA-4096, 10-year validity)
          - Root CRL (empty)
          - Root CA key: nested encryption (outer=felixboehm, inner=nantero1)

          ## No Issuing CAs yet
          This workflow creates ONLY the Root CA. Each founder's (and
          later each partner's) Issuing CA is created separately via
          \`pki-onboard\` — same flow for founders and future partners.

          ## After merging this PR
          1. Sync the Root CA blob to secrets:
             \`\`\`
             ./scripts/sync-keys-from-workflow.sh ${{ github.run_id }}
             \`\`\`
          2. Onboard the founders:
             \`\`\`
             gh workflow run pki-onboard.yml -f partner=felixboehm
             gh workflow run pki-onboard.yml -f partner=nantero1
             \`\`\`
          3. Sync after each onboard to set the Issuing CA secret."

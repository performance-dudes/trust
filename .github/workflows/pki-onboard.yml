name: "PKI: Onboard Partner"

on:
  workflow_dispatch:
    inputs:
      partner_name:
        description: "New partner's full name"
        required: true
        type: string
      partner_slug:
        description: "Short name for directories and environments (e.g. 'jane')"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  onboard:
    name: Onboard partner
    runs-on: ubuntu-latest
    environment: pki-root
    env:
      PASSWORD_FELIXBOEHM: ${{ secrets.PKI_PASSWORD_FELIXBOEHM }}
      PASSWORD_NANTERO1: ${{ secrets.PKI_PASSWORD_NANTERO1 }}
      ROOT_CA_KEY_B64: ${{ secrets.ROOT_CA_KEY_ENC_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Create partner PKI
        run: |
          source tools/pki.sh
          SLUG="${{ inputs.partner_slug }}"
          NAME="${{ inputs.partner_name }}"

          TMPDIR="$(mktemp -d)"
          BLOBS="${GITHUB_WORKSPACE}/blobs"
          mkdir -p "$BLOBS"

          # Decode encrypted Root CA key from environment secret and decrypt
          printf '%s' "$ROOT_CA_KEY_B64" | base64 -d > "${TMPDIR}/root-ca.key.enc"
          COMBINED=$(derive_combined_passphrase "$PASSWORD_FELIXBOEHM" "$PASSWORD_NANTERO1")
          pki_decrypt "${TMPDIR}/root-ca.key.enc" "${TMPDIR}/root-ca.key" "$COMBINED"

          # Generate Issuing CA for new partner
          mkdir -p "pki/issuers/${SLUG}"
          generate_rsa_key 3072 "${TMPDIR}/issuing.key"
          create_issuing_ca "${TMPDIR}/root-ca.key" pki/root/ca-cert.pem \
            "${TMPDIR}/issuing.key" "pki/issuers/${SLUG}/issuing-cert.pem" "$NAME" 1825
          echo "01" > "pki/issuers/${SLUG}/issuing-cert.srl"

          # Write encrypted Issuing CA key to blobs/ — NOT committed
          # NOTE: The new partner must run setup-environments.sh to set their
          # own password. For onboarding, we temporarily encrypt with PASSWORD_FELIXBOEHM.
          # Re-encrypt with the partner's own password after they run setup.
          pki_encrypt "${TMPDIR}/issuing.key" "${BLOBS}/${SLUG}-issuing-key.enc" "$PASSWORD_FELIXBOEHM"

          # Initialize partner CRL
          create_empty_crl "${TMPDIR}/issuing.key" "pki/issuers/${SLUG}/issuing-cert.pem" \
            "pki/crl/${SLUG}-crl.pem" 1825

          # Wipe plaintext keys
          secure_wipe "${TMPDIR}/root-ca.key"
          secure_wipe "${TMPDIR}/issuing.key"
          rm -f "${TMPDIR}/root-ca.key.enc"
          rm -rf "${TMPDIR}"

          # Verify Issuing CA chain
          openssl verify -CAfile pki/root/ca-cert.pem "pki/issuers/${SLUG}/issuing-cert.pem"

      - name: Upload encrypted keys as artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-keys
          path: blobs/*.enc
          retention-days: 7

      - name: Remove blobs before commit
        run: rm -rf blobs

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ inputs.partner_slug }}"
          BRANCH="pki/onboard-${SLUG}-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pki/issuers/${SLUG}/ pki/crl/${SLUG}-crl.pem
          git commit -m "feat: onboard partner ${{ inputs.partner_name }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: onboard ${{ inputs.partner_name }} to PKI" \
            --body "## Summary

          New Issuing CA for ${{ inputs.partner_name }} (\`${SLUG}\`).

          ## Public files
          - \`pki/issuers/${SLUG}/issuing-cert.pem\` — Issuing CA certificate
          - \`pki/issuers/${SLUG}/issuing-cert.srl\` — serial counter
          - \`pki/crl/${SLUG}-crl.pem\` — empty CRL

          ## Encrypted Issuing CA key
          Uploaded as workflow artifact \`encrypted-keys\` on this run.

          **Next step after merging:** download the artifact and run
          \`./scripts/sync-keys-from-workflow.sh ${{ github.run_id }}\` locally to
          populate the \`ISSUING_KEY_ENC_B64\` secret in the \`pki-${SLUG}\` GitHub Environment.

          The new partner generates their end-entity key pair locally and submits a CSR
          via pki-issue after the secret is in place.

          Requires all partners' review before merge."

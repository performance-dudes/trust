name: "PKI: Onboard Partner (create Issuing CA)"

# 2-of-2 workflow to create an Issuing CA for a partner. Same flow for the
# initial founders (run after pki-init) and for any future partner.
#
# The new Issuing CA private key is generated and encrypted entirely inside
# the partner's own environment (pki-<partner>), so the partner's passphrase
# never has to live in pki-root. Only the CSR and the signed cert cross
# environment boundaries — both are public data.
#
# Jobs:
#   gate-felixboehm   env: pki-felixboehm   felixboehm approves (2-of-2 gate)
#   gate-nantero1     env: pki-nantero1     Nantero1 approves    (2-of-2 gate)
#   generate-issuing-key (A)   env: pki-<partner>   produces key+CSR
#   sign-csr             (B)   env: pki-root        needs both gates + A
#   finalize-and-commit  (C)   env: pki-<partner>   needs B, builds CRL + PR
#
# 2-of-2 for the Root CA operation (Job B) is enforced by the two gate jobs,
# each running in a single-reviewer environment. Both gates must be approved
# by their respective unique reviewer before sign-csr can run. Listing both
# founders on pki-root alone would NOT be 2-of-2 (GitHub requires only one
# of N required reviewers to approve).
#
# Partner approves their own pki-<partner> env for Jobs A and C.

on:
  workflow_dispatch:
    inputs:
      partner:
        description: "Partner's GitHub username (must be in .github/pki-partners.sh)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:

  # ── Gate: felixboehm must approve ─────────────────────────────────────────
  gate-felixboehm:
    name: "Gate: felixboehm approval"
    runs-on: ubuntu-latest
    environment: pki-felixboehm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-felixboehm policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-felixboehm

  # ── Gate: nantero1 must approve ─────────────────────────────────────────
  gate-nantero1:
    name: "Gate: nantero1 approval"
    runs-on: ubuntu-latest
    needs: gate-felixboehm
    environment: pki-nantero1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}
      - name: Verify pki-nantero1 policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-nantero1

  # ── Job A: generate Issuing CA keypair + CSR in partner's env ────────────
  generate-issuing-key:
    name: Generate Issuing CA key (partner env)
    runs-on: ubuntu-latest
    environment: pki-${{ inputs.partner }}
    env:
      PKI_PASSWORD: ${{ secrets.PKI_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}

      - name: Verify pki-${{ inputs.partner }} policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy "pki-${{ inputs.partner }}"

      - name: Validate partner is known
        run: |
          source .github/pki-partners.sh
          PARTNER="${{ inputs.partner }}"
          found=false
          for slug in "${PARTNERS[@]}"; do
            [ "$slug" = "$PARTNER" ] && found=true
          done
          if [ "$found" != "true" ]; then
            echo "::error::Partner '$PARTNER' is not in .github/pki-partners.sh"
            exit 1
          fi

      - name: Check Issuing CA doesn't already exist
        run: |
          PARTNER="${{ inputs.partner }}"
          if [ -f "pki/issuers/${PARTNER}/issuing-cert.pem" ]; then
            echo "::error::Issuing CA for ${PARTNER} already exists. Use pki-revoke then pki-onboard to replace."
            exit 1
          fi

      - name: Generate key, build CSR, encrypt key
        run: |
          source .github/pki.sh
          PARTNER="${{ inputs.partner }}"

          TMPDIR="$(mktemp -d)"
          OUT="${GITHUB_WORKSPACE}/out"
          mkdir -p "${OUT}/encrypted-keys" "${OUT}/csr"

          generate_rsa_key 3072 "${TMPDIR}/issuing.key"
          build_issuing_ca_csr "${TMPDIR}/issuing.key" "${OUT}/csr/${PARTNER}-issuing.csr" "$PARTNER"

          if [ -z "${PKI_PASSWORD:-}" ]; then
            echo "::error::PKI_PASSWORD not set in pki-${PARTNER} — run scripts/setup-issuer-env.sh"
            exit 1
          fi
          pki_encrypt "${TMPDIR}/issuing.key" "${OUT}/encrypted-keys/${PARTNER}-issuing-key.enc" "$PKI_PASSWORD"

          secure_wipe "${TMPDIR}/issuing.key"
          rm -rf "${TMPDIR}"

      - name: Upload encrypted Issuing CA key
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-keys
          path: out/encrypted-keys/*.enc
          retention-days: 7

      - name: Upload CSR for signing job
        uses: actions/upload-artifact@v4
        with:
          name: issuing-csr
          path: out/csr/*.csr
          retention-days: 1

  # ── Job B: sign the CSR with the Root CA ─────────────────────────────────
  sign-csr:
    name: Sign CSR with Root CA
    runs-on: ubuntu-latest
    needs: [gate-felixboehm, gate-nantero1, generate-issuing-key]
    environment: pki-root
    env:
      PASSWORD_FELIXBOEHM: ${{ secrets.PKI_PASSWORD_FELIXBOEHM }}
      PASSWORD_NANTERO1: ${{ secrets.PKI_PASSWORD_NANTERO1 }}
      ROOT_CA_KEY_NESTED_B64: ${{ secrets.ROOT_CA_KEY_NESTED_B64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}

      - name: Verify pki-root policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy pki-root

      - name: Download CSR
        uses: actions/download-artifact@v4
        with:
          name: issuing-csr
          path: in/csr

      - name: Sign CSR as Issuing CA cert
        run: |
          source .github/pki.sh
          PARTNER="${{ inputs.partner }}"

          TMPDIR="$(mktemp -d)"
          OUT="${GITHUB_WORKSPACE}/out"
          mkdir -p "${OUT}/signed-cert"

          # Decrypt Root CA (nested: outer=felixboehm, inner=nantero1)
          printf '%s' "$ROOT_CA_KEY_NESTED_B64" | base64 -d > "${TMPDIR}/root.nested.enc"
          nested_decrypt_outer "${TMPDIR}/root.nested.enc" "${TMPDIR}/root.inner.enc" "$PASSWORD_FELIXBOEHM"
          nested_decrypt_inner "${TMPDIR}/root.inner.enc" "${TMPDIR}/root-ca.key" "$PASSWORD_NANTERO1"
          rm -f "${TMPDIR}/root.nested.enc" "${TMPDIR}/root.inner.enc"

          sign_issuing_ca_csr \
            "in/csr/${PARTNER}-issuing.csr" \
            "${TMPDIR}/root-ca.key" \
            "pki/root/ca-cert.pem" \
            "${OUT}/signed-cert/${PARTNER}-issuing-cert.pem" \
            1825

          secure_wipe "${TMPDIR}/root-ca.key"
          rm -rf "${TMPDIR}"

          openssl verify -CAfile pki/root/ca-cert.pem "${OUT}/signed-cert/${PARTNER}-issuing-cert.pem"

      - name: Upload signed cert
        uses: actions/upload-artifact@v4
        with:
          name: signed-cert
          path: out/signed-cert/*.pem
          retention-days: 1

  # ── Job C: back in partner env — build CRL + open PR ─────────────────────
  finalize-and-commit:
    name: Finalize (partner env) and open PR
    runs-on: ubuntu-latest
    needs: [generate-issuing-key, sign-csr]
    environment: pki-${{ inputs.partner }}
    env:
      PKI_PASSWORD: ${{ secrets.PKI_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PKI_GUARD_APP_ID }}
          private-key: ${{ secrets.PKI_GUARD_PRIVATE_KEY }}

      - name: Verify pki-${{ inputs.partner }} policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: source .github/pki.sh && verify_environment_policy "pki-${{ inputs.partner }}"

      - name: Download encrypted key
        uses: actions/download-artifact@v4
        with:
          name: encrypted-keys
          path: in/encrypted-keys

      - name: Download signed cert
        uses: actions/download-artifact@v4
        with:
          name: signed-cert
          path: in/signed-cert

      - name: Place cert and build CRL
        run: |
          source .github/pki.sh
          PARTNER="${{ inputs.partner }}"

          mkdir -p "pki/issuers/${PARTNER}" pki/crl
          cp "in/signed-cert/${PARTNER}-issuing-cert.pem" "pki/issuers/${PARTNER}/issuing-cert.pem"

          TMPDIR="$(mktemp -d)"
          pki_decrypt "in/encrypted-keys/${PARTNER}-issuing-key.enc" "${TMPDIR}/issuing.key" "$PKI_PASSWORD"

          create_empty_crl \
            "${TMPDIR}/issuing.key" \
            "pki/issuers/${PARTNER}/issuing-cert.pem" \
            "pki/crl/${PARTNER}-crl.pem" \
            1825

          secure_wipe "${TMPDIR}/issuing.key"
          rm -rf "${TMPDIR}"

      - name: Create PR with Issuing CA public files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PARTNER="${{ inputs.partner }}"
          BRANCH="pki/onboard-${PARTNER}-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "pki/issuers/${PARTNER}/" "pki/crl/${PARTNER}-crl.pem"
          git commit -m "feat: onboard ${PARTNER} — create Issuing CA"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: onboard ${PARTNER}" \
            --body "## Summary
          New Issuing CA for \`${PARTNER}\`, signed by the Root CA.

          The Issuing CA private key was generated and encrypted entirely
          inside \`pki-${PARTNER}\` using the partner's own \`PKI_PASSWORD\`.
          It never touched \`pki-root\`.

          ## Public files
          - \`pki/issuers/${PARTNER}/issuing-cert.pem\` — Issuing CA cert
          - \`pki/crl/${PARTNER}-crl.pem\` — empty CRL

          ## Encrypted Issuing CA key
          Uploaded as workflow artifact \`encrypted-keys\` (7-day retention).

          ## After merging
          1. Sync the encrypted key into ${PARTNER}'s environment secret:
             \`\`\`
             ./scripts/sync-keys-from-workflow.sh ${{ github.run_id }}
             \`\`\`
          2. ${PARTNER} can now issue end-entity certs via pki-issue."

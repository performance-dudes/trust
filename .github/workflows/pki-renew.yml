name: "PKI: Renew Certificate"

on:
  workflow_dispatch:
    inputs:
      issuer:
        description: "Issuing CA GitHub username (as defined in .github/pki-partners.sh)"
        required: true
        type: string
      csr_path:
        description: "Path to new CSR file relative to repo root"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  renew:
    name: Renew certificate
    runs-on: ubuntu-latest
    environment: pki-${{ inputs.issuer }}
    env:
      PASSWORD: ${{ secrets.PKI_PASSWORD }}
      ISSUING_KEY_B64: ${{ secrets.ISSUING_KEY_ENC_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify CSR exists
        run: |
          if [ ! -f "${{ inputs.csr_path }}" ]; then
            echo "::error::CSR not found: ${{ inputs.csr_path }}"
            exit 1
          fi

      - name: Renew certificate
        run: |
          source .github/pki.sh
          ISSUER="${{ inputs.issuer }}"
          CSR="${{ inputs.csr_path }}"

          # Extract CN from CSR
          CN="$(openssl req -in "$CSR" -noout -subject -nameopt multiline | grep commonName | sed 's/.*= //')"
          SLUG="$(echo "$CN" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g')"

          if [ ! -f "pki/certs/${SLUG}.pem" ]; then
            echo "::error::Existing certificate not found: pki/certs/${SLUG}.pem"
            exit 1
          fi

          TMPDIR="$(mktemp -d)"

          # Decode and decrypt Issuing CA key
          printf '%s' "$ISSUING_KEY_B64" | base64 -d > "${TMPDIR}/issuing.key.enc"
          pki_decrypt "${TMPDIR}/issuing.key.enc" "${TMPDIR}/issuing.key" "$PASSWORD"

          # Re-sign CSR with Issuing CA
          openssl x509 -req -in "$CSR" \
            -CA "pki/issuers/${ISSUER}/issuing-cert.pem" \
            -CAkey "${TMPDIR}/issuing.key" \
            -set_serial "0x$(openssl rand -hex 16)" \
            -out "pki/certs/${SLUG}.pem" \
            -days 730 \
            -extfile <(printf '%s\n' \
              "basicConstraints=critical,CA:FALSE" \
              "keyUsage=critical,digitalSignature,nonRepudiation" \
              "extendedKeyUsage=emailProtection,1.3.6.1.4.1.311.10.3.12" \
              "subjectKeyIdentifier=hash" \
              "authorityKeyIdentifier=keyid:always")

          # Wipe
          secure_wipe "${TMPDIR}/issuing.key"
          rm -f "${TMPDIR}/issuing.key.enc"
          rm -rf "${TMPDIR}"

          # Verify
          cat "pki/issuers/${ISSUER}/issuing-cert.pem" pki/root/ca-cert.pem > /tmp/chain.pem
          openssl verify -CAfile /tmp/chain.pem "pki/certs/${SLUG}.pem"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CSR="${{ inputs.csr_path }}"
          CN="$(openssl req -in "$CSR" -noout -subject -nameopt multiline | grep commonName | sed 's/.*= //')"
          SLUG="$(echo "$CN" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g')"
          BRANCH="pki/renew-${SLUG}-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pki/certs/
          git commit -m "feat: renew certificate for ${CN}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: renew certificate for ${CN}" \
            --body "Renewed by: ${{ inputs.issuer }}
          Extended validity: 2 years"

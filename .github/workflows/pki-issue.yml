name: "PKI: Issue End-Entity Certificate"

on:
  workflow_dispatch:
    inputs:
      issuer:
        description: "Issuing CA GitHub username (as defined in .github/pki-partners.sh)"
        required: true
        type: string
      csr_path:
        description: "Path to CSR file relative to repo root (e.g. pki/csrs/member-name.csr)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  issue:
    name: Issue certificate
    runs-on: ubuntu-latest
    environment: pki-${{ inputs.issuer }}
    env:
      PASSWORD: ${{ secrets.PKI_PASSWORD }}
      ISSUING_KEY_B64: ${{ secrets.ISSUING_KEY_ENC_B64 }}
      ISSUER: ${{ inputs.issuer }}
      CSR_PATH: ${{ inputs.csr_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          # Defense in depth: workflow_dispatch triggerers have actions:write,
          # but a strict allow-list prevents typos and shell injection if the
          # value were ever interpolated unsafely elsewhere.
          if ! [[ "$ISSUER" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::issuer contains illegal characters: $ISSUER"
            exit 1
          fi
          if ! [[ "$CSR_PATH" =~ ^pki/csrs/[a-zA-Z0-9_.-]+\.csr$ ]]; then
            echo "::error::csr_path must match pki/csrs/<name>.csr — got: $CSR_PATH"
            exit 1
          fi
          if [ ! -f "$CSR_PATH" ]; then
            echo "::error::CSR not found: $CSR_PATH"
            exit 1
          fi

      - name: Issue certificate
        run: |
          source .github/pki.sh

          TMPDIR="$(mktemp -d)"

          # Decode encrypted Issuing CA key from environment secret and decrypt
          printf '%s' "$ISSUING_KEY_B64" | base64 -d > "${TMPDIR}/issuing.key.enc"
          pki_decrypt "${TMPDIR}/issuing.key.enc" "${TMPDIR}/issuing.key" "$PASSWORD"

          # Extract CN from CSR for output filename
          CN="$(openssl req -in "$CSR_PATH" -noout -subject -nameopt multiline | grep commonName | sed 's/.*= //')"
          SLUG="$(echo "$CN" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g')"

          # Sign CSR (random 128-bit serial, RFC 5280 best practice)
          mkdir -p pki/certs
          openssl x509 -req -in "$CSR_PATH" \
            -CA "pki/issuers/${ISSUER}/issuing-cert.pem" \
            -CAkey "${TMPDIR}/issuing.key" \
            -set_serial "0x$(openssl rand -hex 16)" \
            -out "pki/certs/${SLUG}.pem" \
            -days 730 \
            -extfile <(printf '%s\n' \
              "basicConstraints=critical,CA:FALSE" \
              "keyUsage=critical,digitalSignature,nonRepudiation" \
              "extendedKeyUsage=emailProtection,1.3.6.1.4.1.311.10.3.12" \
              "subjectKeyIdentifier=hash" \
              "authorityKeyIdentifier=keyid:always" \
              "crlDistributionPoints=URI:${PD_TRUST_REPO_URL_BASE}/pki/crl/${ISSUER}-crl.pem" \
              "authorityInfoAccess=caIssuers;URI:${PD_TRUST_REPO_URL_BASE}/pki/issuers/${ISSUER}/issuing-cert.pem")

          # Wipe
          secure_wipe "${TMPDIR}/issuing.key"
          rm -f "${TMPDIR}/issuing.key.enc"
          rm -rf "${TMPDIR}"

          # Verify chain
          cat "pki/issuers/${ISSUER}/issuing-cert.pem" pki/root/ca-cert.pem > /tmp/chain.pem
          openssl verify -CAfile /tmp/chain.pem "pki/certs/${SLUG}.pem"

          echo "SLUG=${SLUG}" >> "$GITHUB_ENV"
          echo "CN=${CN}" >> "$GITHUB_ENV"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="pki/issue-${SLUG}-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pki/certs/
          git commit -m "feat: issue certificate for ${CN}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: issue certificate for ${CN}" \
            --body "Issued by: ${ISSUER}
          CSR: \`${CSR_PATH}\`
          Subject: ${CN}
          Validity: 2 years"
